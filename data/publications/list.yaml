works:
- title: "Schooling and Labor Market Consequences of School Construction in Indonesia: A Reply to Roodman"
  pdflink: "/papers/duflo-et-al-2026.pdf"
  book: "Journal of Comments and Replications in Economics, Vol. 5, 2026"
  doilink: "https://doi.org/10.18718/81781.57"
  coauthors: "Esther Duflo, Allan Hsiao, and Nathan Lazarus"
  links:
    - url:
      text:
  abstract: >
    Roodman (2026) reexamines the findings of Duflo (2001) on school construction in Indonesia. We endorse his corrections to standard errors and data entry errors, but disagree with his suggestion to drop the control for the number of children in the district. We show that this control is necessary because more populous districts received fewer schools per capita, and this variation is not useful for identification. We also present results from extended datasets, including additional survey waves, which support the original findings.
