<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found</title>
  <link rel="stylesheet" href="{{ "/css/style.css" | relURL }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="180x180" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
  <script>
    (function () {
      var p = window.location.pathname.replace(/^\/+/, "");
      var first = p.split("/")[0];
      var passthroughs = ["refi", "dashboard", "ducking", "travel", "papers"];
      if (passthroughs.indexOf(first) !== -1) {
        var dest = "/mikeyjarrell-private/" + p + window.location.search + window.location.hash;
        window.location.replace(dest);
      }
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>{{ .Site.Title }}</h1>
      <p>{{ .Site.Params.shortbio }}</p>
    </header>
    <section>
      <h2>Page not found</h2>
      <p>The page you were looking for doesn't exist. <a href="/">Return home</a>.</p>
    </section>
  </div>
</body>
</html>
